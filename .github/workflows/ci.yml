name: CI — Lint, Test & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff black mypy

      - name: Ruff lint
        run: ruff check src/ api/ tests/

      - name: Black format check
        run: black --check src/ api/ tests/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests (no Ollama required)
        run: |
          pytest tests/test_config.py \
                 tests/test_attack_taxonomy.py \
                 tests/test_prompt_templates.py \
                 tests/test_mitigation.py \
                 tests/test_monitoring.py \
                 -v --tb=short --co -q 2>/dev/null || \
          pytest tests/test_config.py \
                 tests/test_attack_taxonomy.py \
                 tests/test_prompt_templates.py \
                 tests/test_mitigation.py \
                 tests/test_monitoring.py \
                 -v --tb=short

      - name: Run API tests (mock, no Ollama)
        run: |
          pytest tests/test_api.py -v --tb=short -k "health or stats or jobs or empty or nonexistent or counterfactual"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit security scan
        run: bandit -r src/ api/ -ll --skip B101

      - name: Safety dependency check
        run: safety check -r requirements.txt --short-report || true
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f api/Dockerfile -t bias-sentinel:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-api -p 8000:8000 bias-sentinel:test || true
          sleep 3
          docker logs test-api 2>&1 | head -20
          docker stop test-api || true
          docker rm test-api || true
